name: dbt_CI_Security_Guard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt_compile_check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 妳的真實密碼 # <-- 🔑 確保這裡、upload.py、profiles.yml 三個密碼完全一致
        ports:
          - 5433:5432

    steps:
      - name: 1. 複製專案代碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 設定 uv 環境並安裝所有套件
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      # 💡 這裡把 dbt、prefect、pandas 和 sqlalchemy 一把抓，通通裝好！
      - name: 3.5 安裝 Pipeline 所需套件
        run: |
          uv pip install dbt-core dbt-postgres prefect pandas sqlalchemy psycopg2-binary --system

      # 🚀 終極重頭戲：直接啟動整條 Pipeline！
      - name: 4. 真正執行整條 Pipeline (Prefect Flow)
        run: |
          # 💡 關鍵：叫 Prefect 雲端測試時用記憶體就好，別去鎖 SQLite 檔案
          prefect config set PREFECT_API_DATABASE_CONNECTION_URL="sqlite+aiosqlite:///:memory:"
          python orchestrate_pipeline.py