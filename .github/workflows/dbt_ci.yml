name: dbt_CI_Security_Guard

# 💡 設定觸發條件：只要有人對 main 分支發起 Pull Request，保安就立刻開工
on:
  pull_request:
    branches:
      - main

jobs:
  dbt_compile_check:
    runs-on: ubuntu-latest # 憑空變出一台乾淨的 Linux 電腦

    steps:
      - name: 1. 複製專案代碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🚀 修正後的第 3 步：正統使用官方 setup-uv 插件，速度極快
      - name: 3. 設定 uv 環境並安裝 dbt
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: 3.5 使用 uv 安裝 dbt 套件
        run: |
          uv pip install dbt-core dbt-postgres --system

      - name: 4. 語法大檢查 (Compile)
        run: |
          # 這裡叫雲端保安悄悄編譯所有的 SQL，檢查有沒有少打逗號、括號沒對齊或 Jinja 語法寫錯
          dbt compile --profiles-dir .