name: dbt_CI_Security_Guard

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt_compile_check:
    runs-on: ubuntu-latest

    # 💡 關鍵：在雲端電腦裡當場啟動一個點綴用的 PostgreSQL 服務
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres  # <-- 請改成妳 profiles.yml 裡設定的 db 名字
          POSTGRES_USER: postgres  # <-- 請改成妳 profiles.yml 裡設定的 user
          POSTGRES_PASSWORD: postgres  # <-- 請改成妳 profiles.yml 裡設定的密碼
        ports:
          - 5433:5432 # 讓雲端的 5433 連進去它預設的 5432

    steps:
      - name: 1. 複製專案代碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 設定 uv 環境並安裝 dbt
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: 3.5 使用 uv 安裝 dbt 套件
        run: |
          uv pip install dbt-core dbt-postgres --system

      - name: 4. 語法大檢查 (Compile)
        working-directory: ./dbt_project
        run: |
          dbt compile --profiles-dir .